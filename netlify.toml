# DreamOS — Netlify Configuration
# Replaces Cloudflare Pages as primary host
# Cloudflare is kept only for Turnstile bot protection

[build]
  command = "npm run build"
  publish = "dist"

# While on pre-Vite main branch, serve index.html directly
# This block is ignored once Vite build lands
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

