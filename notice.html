<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="6;url=https://dream-os.pages.dev" />
  <title>DreamOS has moved</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #07050f;
      color: #ede9fe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 400px;
      width: 100%;
    }
    .moon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #c084fc;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      color: #9d85c0;
      margin-bottom: 24px;
    }
    a.btn {
      display: inline-block;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .note {
      font-size: 12px;
      color: #574d78;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <span class="moon" aria-hidden="true">🌙</span>
    <h1>DreamOS has moved</h1>
    <p>
      We have a new home at
      <strong>dream-os.pages.dev</strong>.
      You will be taken there in a moment.
      If you are not redirected automatically, use the button below.
    </p>
    <a
      href="https://dream-os.pages.dev"
      class="btn"
      aria-label="Go to DreamOS at dream-os.pages.dev"
    >
      Take me to DreamOS
    </a>
    <p class="note">
      Free for life. Free for ∞. Open source and accessible.
    </p>
  </main>
</body>
</html>
