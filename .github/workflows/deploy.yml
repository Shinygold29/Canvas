name: Validate

on:
  push:
    branches: [main, preview, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "index.html missing"
            exit 1
          fi
          echo "index.html found — $(wc -l < index.html) lines"

      - name: Check no old terminology in UI
        run: |
          # Warn if any old Dream Board Mobile UI text slipped in
          count=$(grep -c "Dream Board Mobile" index.html || true)
          echo "Old name references in index.html: $count"

      - name: Syntax check worker.js
        run: node --check worker.js && echo "worker.js syntax OK"

